<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SupportBot</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <h1>SupportBot</h1>
      <p>Бот поддержки пользователей</p>
    </div>

    <div class="chat-box" id="chat-box">
      <div class="message bot">
        Здравствуйте! Я SupportBot 💬<br><br>
        Я могу помочь по следующим вопросам:<br>
        <b>доставка</b><br>
        <b>оплата</b><br>
        <b>возврат</b><br>
        <b>контакты</b><br><br>
        Напишите один из вариантов.
      </div>
    </div>

    <div class="chat-input-area">
      <input type="text" id="user-input" placeholder="Введите ваш вопрос..." />
      <button id="send-btn">Отправить</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
